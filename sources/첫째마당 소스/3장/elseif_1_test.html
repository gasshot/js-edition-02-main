<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> else if문 </title>
<script>
	var score = prompt("당신의 점수는?", "0");

	var result = "";

	if(score >= 90){
		result = "A"; // A학점
	}
	else if(score >= 80){
		result = "B"; // B학점
	}
	else if(score >= 70){
		result = "C"; // C학점
	}
	else if(score >= 60){
		result = "D"; // D학점
	}
	else{
		result = "F"; // F학점
	}

	document.write("학생의 학점은" + result + "입니다.");
</script>
</head>
<body>
</body>
</html>
