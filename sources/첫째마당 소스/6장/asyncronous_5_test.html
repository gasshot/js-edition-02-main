<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Promise Test 2</title>
    <script>
        const API_URL = "https://jsonplaceholder.typicode.com/users";

        function getFetchUsers() {
            console.log("Fetching Load Data..."); // 콘솔창에서 표시 Fetching Load Data...

            fetch(API_URL)
                .then((response) => {
                    console.log(response.status); // 응답 성공
                    if (!response.ok) {
                        throw new Error(`응답오류! 상태: ${response.status}`);
                    }

                    return response.json();
                })
                .then((users) => {
                    // 인덱스 3보다 작은 2에서 끊어라(0, 1, 2) => 3개 추출
                    users.slice(0, 3).forEach((user, index) => {
                        console.log(`${index + 1} ${user.name} (${user.email})`);
                        console.log(`해당 유저의 회사 이름은 ${user.company.name}`);
                    });
                })
                .catch((error) => {
                    // 네트워크 또는 처리 오류 시 실행
                    console.error("Error fetching users:", error.message);
                });
        }

        getFetchUsers();
    </script>
</head>

<body>

</body>

</html>
