<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Promise Test 1</title>
  <script>
    function rocketReady(rocketName) {
      return new Promise((resolve, reject)=>{
        setTimeout(()=>{
          const result = (Math.random() > 0.3); // 0 ~ 1사이에 값이 랜덤선택 후 0.3보다 큰지 확인
          console.log(`result: ${result}`);

          if(result){
            resolve(`${rocketName} 발사 완료`);
          }else{
            reject(`${rocketName} 발사 실패`);            
          }
        }, 3000);

      })
    }
    rocketReady("누리호")
    .then((response) => {
      console.log(`성공: ${response}`);
    })
    .catch((response) => {
      console.log(`실패: ${response}`);
    })
    .finally((response) => {
      console.log("우주 발사체 테스트 완료");
    });

  </script>
</head>

<body>

</body>

</html>
