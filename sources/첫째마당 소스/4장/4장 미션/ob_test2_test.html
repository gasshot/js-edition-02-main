<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<title> 객체 </title>
	<script>
		// 짜장면, 돈가스 김치찌개 회덮밥 중에서 점심메뉴가 랜덤으로 선택되도록 만들어 보세요.
		// 1. 배열 객체를 이용하여 5개 메뉴 데이터를 변수 menu에 참조하세요.
		// 2. Math.random()과 배열 데이터 개수(length)를 이용하여 배열 인덱스값이 랜덤으로 나오도록 하세요.


		var menu = ["짜장면", "돈까스", "김치찌개", "회덮밥"];
		var menuNum = Math.floor(Math.random() * menu.length); // 0 ~ 3

		// Math.random()  => 0 <= 랜덤값 < 1
		// Math.random() * 4 => 0 <= 랜덤값 < 4 => 4는 절대로 나오지 않는다
		// Math.floor(3.9999999999999999) =>

		var result = menu[menuNum];

		document.write(result);
	</script>
</head>

<body>
</body>

</html>
