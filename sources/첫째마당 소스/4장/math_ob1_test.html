<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset = "UTF-8">
<title> 수학객체 </title>
<script>
	var num = 2.1234;

	var maxNum = Math.max(10, 5, 8, 30);  // 최댓값 => 30
	var minNum = Math.min(10, 5, 8, 30);  // 최솟값 => 5
	var roundNum = Math.round(num);       // 2.1234 => 소수점 첫째 자리 반올림
	var floorNum = Math.floor(num);       // 2.1234 => 소수점 첫째 자리 내림 => 2
	var ceilNume = Math.ceil(num);        // 2.1234 => 소수점 첫째 자리 올림 => 3
	var rndNum = Math.random();           // random() => 0 ~ 1 사이의 값
	var piNum  = Math.PI;                 // 원주율 상수 반환

	document.write(maxNum, "<br>");
	document.write(minNum, "<br>");
	document.write(roundNum, "<br>");
	document.write(floorNum, "<br>");
	document.write(ceilNume, "<br>");
	document.write(rndNum, "<br>");
	document.write(piNum, "<br>");
</script>
</head>
<body>
</body>
</html>
