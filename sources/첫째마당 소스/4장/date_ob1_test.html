<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<title> 날짜 정보 객체 </title>
	<script>
		var today = new Date(); // 오늘날짜 객체 담기
		var nowMonth = today.getMonth(); // getMonth 기능으로 인해 결과값(월-1)이 nowMonth 변수에 담김
		var nowDate = today.getDate();   // getDate 기능으로 인해 결과값(일)이 nowDate 변수에 담김
		var nowDay = today.getDay();     // getDay 기능으로 인해 결과값(요일)이 nowDay 변수에 담김

		document.write("<h1>오늘 날짜 정보</h> <br>");
		document.write("현재 월: " + (nowMonth), "<br>");
		document.write("현재 일: " + nowDate, "<br>");
		document.write("현재 요일: " + nowDay, "<br>");
		
		var worldcup = new Date(2002, 4, 31);
		var theMonth = worldcup.getMonth(); // 달
		var theDate = worldcup.getDate();   // 일
		var theDay = worldcup.getDay();     // ??요일(숫자)

		document.write("<h1> 2002 한/일 월드컵 날짜 정보</h> <br>");
		document.write("2002월드컵 몇 월: " + (theMonth), "<br>");
		document.write("2002월드컵 몇 일: " + theDate, "<br>");
		document.write("2002월드컵 무슨 요일: " + theDay, "<br>");

	</script>
</head>

<body>
</body>

</html>
