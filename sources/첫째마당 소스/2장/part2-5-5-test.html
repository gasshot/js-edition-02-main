<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title> 비교 연산자 </title>
	<script>
		var a = 10;
		var b = 20;
		var c = 10;
		var f = "20";
		var result;

		result = a > b; // 10 > 20 ?? => false
		document.write(result, "<br>");

		result = a < b; // 10 < 20 ?? => true
		document.write(result, "<br>");	

		result = a <= b; // 10 <= 20 ?? => true
		document.write(result, "<br>");	

		result = b == f; // 20 == "20" ?? => true
		document.write(result, "<br>");	

		result = a != b; // 10 != 20 ?? => true
		document.write(result, "<br>");

		result = b === f; // 20(숫자데이터타입) === "20"(문자열데이터타입) ?? => false
		document.write(result, "<br>");

	</script>
</head>
<body>
</body>
</html>
