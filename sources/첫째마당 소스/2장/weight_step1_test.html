<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 과체중 테스트 </title>
<script>
	var userHeight = 180; //신장
	var userWeight = 74; //몸무게

	var nomal_w = (180 - 100) * 0.9; // 적정체중
	
	document.write(`신장: ${userHeight}(cm) <br>`);
	document.write(`체중: ${userWeight}(kg) <br>`);
	document.write(`적정 체중: (${userHeight} - 100) * 0.9 <br>`);
	document.write(`결과: 적정 체중은 ${nomal_w}kg이며, 현재 적정 체중에서 ${userWeight - nomal_w}kg 초과한 것을 알 수 있습니다.`);



</script>
</head>
<body>
</body>
</html>
