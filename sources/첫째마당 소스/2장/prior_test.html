<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 논리연산자 </title>
<script>
  var a = 10;
  var b = 20;
  var m = 30;
  var n = 40;

  var result;
  result = a > b || b>=m || m > n; // false || false || fase;
  document.write(result, "<br>");  // 결과 : false

  result = a > b || b >= m || m <= n; 
  document.write(result, "<br>");  // 결과 : true

  result = a <= b && b >= m && m <= n; // true && false && true
  document.write(result, "<br>");  // 결과 : false

  result = a <= b && b <= m && m <= n; // true && true && true
  document.write(result, "<br>");  // 결과 : true

  result = !(a > b); // true
  document.write(result, "<br>");  // 결과 : true
    
</script>
</head>
<body>
</body>
</html>
