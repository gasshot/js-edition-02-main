	var price1 = 3000;
	var price2 = 3000;
	var price3 = 3000;

	// 하루 지출 비용의 합계
	var sum = price1 + price2 + price3; // 3000 + 3000 + 3000 = 9000
	var nomal_s = 10000; // 하루 적정 지출 비용

	var result = sum > nomal_s ? `${sum - nomal_s}초과` : "돈 관리 잘 했어요!";

	document.write(result);


</script>
