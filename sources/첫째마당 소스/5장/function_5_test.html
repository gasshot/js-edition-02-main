<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset = "UTF-8">
<title> 함수 </title>
<script>
    // arrData 매개변수가 받아올 데이터의 타입은 배열
    function testAvg(arrData){
        var sum = 0; // 합계를 담을 변수 sum
        for(var i = 0; i < arrData.length; i++){
            // a += b : a의 변수의 기존 데이터를 가져와서 b를 더해준 결과값을 다시 a에 재할당(복합대입연산자)
            // sum = sum + Number(prompt(arrData[i] + " 점수는?", "0"))
            // sum = sum + 들어올 arrData의 i번째 인덱스에 있는 데이터 점수는? 창이뜬다.
            // 그 창에서 입력받는 문자데이터를 => Number라는 객체를 이용하여 숫자 데이터로 변환함.
            // 변환된 데이터는 sum과 더해지고 그 더해진 결과값을 다시 sum에 재할당함.

            sum += Number(prompt(arrData[i] + " 점수는?", "0"));
        }
        // sum은 현재까지 입력된 숫자를 합쳐놓은 상태가 됨 => 합계

        // avg = 지금까지 반복해서 입력한 숫자들의 합 / 지금까지 반복한 횟수 => 평균
        var avg = sum / arrData.length;
        // 리턴 => 함수야 종료를 준비해라 => 종료시 리턴 뒤에 있는 값을 결과로 반환해라 => 메서드 종료 
        return avg;
    }

    // arrSubject라는 변수에 배열이 존재하고 그 배열 안에는 "국어", "수학" 들어있어요(length가 2인 배열)
    var arrSubject = ["국어", "수학"];
    // result라는 변수에 testAvg의 결과값인 평균점수가 할당된다.
    var result = testAvg(arrSubject);

    document.write("평균 점수는 " + result + "점입니다.");



</script>
</head>
<body>
</body>
</html>
