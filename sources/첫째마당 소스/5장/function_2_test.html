<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title> 함수 </title>
	<script>
		var color = ["white", "yellow", "aqua", "purple"]; // 색깔 문자를 담은 배열

		var i = 0; // 해당 배열의 인덱스처리를 위한 변수
		function changeColor(){ // changeColor라는 함수명을 가진 함수(기능 or Method)
			i++; // i값을 가져와서 1만큼 증가 시킨 뒤에 결과값을 다시 i에 대입
			if(i >= color.length){ // 마지막 인덱스보다 더 큰 경우에는 강제로 첫번째 인덱스로 변환
				i = 0;             // out of index => 배열 길이 초과 오류를 방지하기 위함
			}

			var bodyTag = document.getElementById("theBody"); // id가 theBody로 되어있는 html요소를 찾아줘
			bodyTag.style.backgroundColor = color[i]; // i 인덱스에 들어있는 컬러명을 할당해줌
			// 결국 페이지의 배경색이 color[i]로 변경된다.
		}

	</script>
</head>

<body id="theBody">
	<button onclick="changeColor();">배경색 바꾸기</button>
</body>

</html>
