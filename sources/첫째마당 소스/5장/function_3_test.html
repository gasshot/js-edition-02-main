<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title> 함수 </title>
	<script>
		function myFnc(name, area){
			// 매개변수 2개를 가지고 myFnc라는 이름을 가지는 함수다.
			// {} : 함수 스코프 => 함수가 실행할 코드를 작성하는 곳
			document.write("안녕하세요. " + name + "입니다.", "<br>"); 
			document.write("사는 곳은 " + area + "입니다.", "<br><br>"); 
		}

		myFnc("홍당무", "서울"); // 안녕하세요. ???입니다.
                                // 사는 곳은 ???입니다.
		myFnc("깍두기", "부산");
	</script>
</head>

<body>
</body>

</html>
