<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<title> 탐색 선택자 </title>
	<script src="js/jquery.js"></script>
	<script>
		$(function () {
			// 1. id가 inner_1인 요소의 하위 요소 <p>요소들 중에
			// 인덱스가 0인 요소를 찾아 해당 요소의 상태 visible을 체크합니다.
			// 체크한 상태를 변수 result_1에 담습니다.
			// result_1에는 true가 담깁니다.

			var result_1 = $("#inner_1 p")
				.eq(0).is(":visible"); // true
			console.log(result_1);

			// 2. id가 inner_1인 요소의 하위 요소 <p>요소들 중에
			// 인덱스가 1인 요소를 찾아 해당 요소의 상태 visible을 체크합니다.
			// 체크한 상태를 변수 result_2에 담습니다.
			// result_2에는 false가 담깁니다.

			var result_2 = $("#inner_1 p")
				.eq(1).is(":visible"); // false	
			console.log(result_2);

			// 3. id가 chk1인 요소의 상태 checked를 체크합니다.
			// 체크한 상태를 변수 result_3에 담습니다.
			// result_3에는 true가 담깁니다.

			var result_3 = $("#chk1").is(":checked"); // true
			console.log(result_3);

			// 4. id가 chk2인 요소의 상태 checked를 체크합니다.
			// 체크한 상태를 변수 result_4에 담습니다.
			// result_4에는 false가 담깁니다.
			
			var result_4 = $("#chk2").is(":checked"); // false
			console.log(result_4);
		});
	</script>
</head>

<body>
	<div id="outer_wrap">
		<h1>is( )</h1>
		<section id="inner_1">
			<h2>문단 태그 영역</h2>
			<p>내용1</p>
			<p style="display:none;">내용2</p>
		</section>

		<section id="inner_2">
			<h2>폼 태그 영역</h2>
			<p>
				<input type="checkbox" name="chk1" id="chk1" checked>
				<label for="chk1">체크1</label>

				<input type="checkbox" name="chk2" id="chk2">
				<label for="chk2">체크2</label>
			</p>
		</section>
	</div>
</body>

</html>
