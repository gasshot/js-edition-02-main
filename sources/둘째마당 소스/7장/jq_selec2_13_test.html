<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<title> 탐색 선택자 </title>
	<script src="js/jquery.js"></script>
	<script>
		$(function () {
			// 1. id가 inner_1인 요소의 하위 요소들 중 선택된 <p>요소 중
			// innerText가 내용1을 담고있는 요소를 선택합니다.	
			$("#inner_1 p:contains(내용1)")
			.css({"background-color":"#ff0"});

			// 2. id가 inner_1인 요소의 하위 요소들 중 선택된 <p>요소 중
			// <strong>요소를 포함하는 요소만 선택합니다.	
			$("#inner_1 p:has(strong)")  
			.css({"background-color":"0ff"});
			
			// 3. id가 outer_wrap인 요소의 바로 아래 하위요소를 선택합니다.
			$("#outer_wrap").contents()
			.css({"border":"1px dashed #00f"});

			// 4. id가 inner_2인 요소의 하위 요소들 중 선택된 <p>요소들 중에
			// 첫번째 요소만 제외하고 선택합니다.
			$("#inner_2 p").not(":first")  
			.css({"background-color":"0f0"});
			
			// 5. id가 inner_2인 요소의 하위 요소들 중 선택된 <p>요소들 중에
			// 인덱스 2번에 해당하는 요소를 선택후 다시 end 메서드를 적용하여 인덱스를 
			// 선택하기 전의 선택자가 적용됩니다.
			// 결론적으로 p태그 전체를 선택합니다.
			// **** end() => 앞에 있는 메서드 취소
			
			$("#inner_2 p").eq(2).end()
			.css({"color":"#f00"});
		});
	</script>
</head>

<body>
	<div id="outer_wrap">
		<h1>콘텐츠 탐색 선택자</h1>
		<section id="inner_1">
			<h1>contains( ), contents( ), has( )</h1>
			<p><span>내용1</span></p>
			<p><strong>내용2</strong></p>
			<p><span>내용3</span></p>
		</section>
		<section id="inner_2">
			<h1>not( ), end( )</h1>
			<p>내용4</p>
			<p>내용5</p>
			<p>내용6</p>
		</section>
	</div>
</body>

</html>
