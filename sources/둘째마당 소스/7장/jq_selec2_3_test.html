<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="UTF-8">
	<title> 탐색 선택자 </title>
	<script src="js/jquery.js"></script>
	<script>
		$(function () {
			// 배열 덩어리<li들을 담고 있는 배열>
			$("#menu li").eq(2)
				.css({ "background-color": "#ff0" });
			// index 2보다 작은 요소들을 찾아라.	
			$("#menu li:lt(2)")
				.css({ "background-color": "#0ff" });
			// index 2보다 큰 요소들을 찾아라.
			$("#menu li:gt(2)")
				.css({ "background-color": "#f0f" });
		});
	</script>
</head>

<body>
	<h1>탐색 선택자</h1>
	<ul id="menu">
		<li>내용1</li>
		<li>내용2</li>
		<li>내용3</li>
		<li>내용4</li>
		<li>내용5</li>
	</ul>
</body>

</html>
