<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title> 객체 조작 및 생성 </title>
	<script src="js/jquery.js"></script>
	<script>
		$(function () {

			// 1. id가 sec_1인 요소의 하위 요소들을 문자열로 가져와
			// 변수 result_1에 담습니다.

			var result_1 = $("#sec_1").html();
			console.log(result_1);

			// 2. id가 sec_1인 요소의 하위 요소 <p>요소들을 선택하여 해당 html 내용을
			// 입력한 매개변수 값으로 대체합니다.
			// 단순한 "내용1"이라는 문장 => html a태그로 교체(내용 : Text1)	

			$("#sec_1 p").html("<a href=\"#\">Text1</a>");

			// 3. id가 sec_2인 요소의 하위 요소들을 문자열로 가져와
			// 변수 result_2에 담습니다.(태그들은 제외되며 태그들의 내용들만 담겨옵니다.)
	
			var result_2 = $("#sec_2").text();
			console.log(result_2);

			// 4. id가 sec_2인 요소의 하위 요소 h2요소를 찾아서
			// 해당 요소의 내용을 text()로 변경하세요.
			// 텍스트() => text()
			$("#sec_2 h2").text("text()");

		});
	</script>
</head>

<body>
	<h1><strong>객체 조작 및 생성</strong></h1>
	<section id="sec_1">
		<h2><em>html()</em></h2>
		<p>내용1</p>
	</section>
	<section id="sec_2">
		<h2><em>텍스트()</em></h2>
		<p>내용2</p>
	</section>
</body>

</html>
