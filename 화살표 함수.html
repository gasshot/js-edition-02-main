<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title> 화살표 함수 </title>
    <script>
        // Arrow Function
        // 함수입니다. 간략 표시된 함수입니다.

        var aaa = function() { return 11; } // 변수에 담는 형식
        var aaa = () => { return 11 }; // 화살표 형식
        var aaa = () => 11;            // 더 간략화한 화살표 형식(람다 표현)

        document.write(aaa());
        

    </script>
</head>

<body>
</body>

</html>
