<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전개구문</title>

    <script>
        // ... : 전개구문
        // 변수 1 = [값1,값2,값3, ..., 값n,]
        // 변수 2 = [값4,값5,값6, ..., 값n,]
        // 변수 3 = [...변수명1, ...변수명2]

        // let arr1 = [1, 2, 3]; 크기가 3인 배열 arr1
        // let arr2 = [4, 5];    크기가 2인 배열 arr2
        // let arr3 = [...arr1, ...arr2];
        // arr3 => [1, 2, 3, 4, 5] 크기가 5인 배열 arr3

        // 변수1 = {속성1: 값1, 속성2: 값2}
        // 변수2 = {속성3: 값3}
        // 변수3 = {...변수명1, ...변수명2}

        // let obj1 = {"id": "a1234", "name": 최군}; 
        // let obj2 = {"contry": "kor"};
        // let obj3 = {..obj1, ...obj2};

        let obj1 = { "id": "a1234", "name": "최군" };
        let obj2 = { "contry": "kor" };

        // obj1과 obj2의 내용을 펼쳐서 새로운 객체 { } 안에 담습니다.
        let obj3 = { ...obj1, ...obj2 };

        console.log(obj3);
        // 결과: { "id": "a1234", "name": "최군", "contry": "kor" }


    </script>
</head>

</body>

</html>
