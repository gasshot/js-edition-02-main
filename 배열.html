<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map</title>

    <script>
       // 변수명 = new Map();
       const map_1 = new Map();

       // 변수명.set("키", 값)
       map_1.set("coffee", 3000);

       // 변수명.get("키") => 해당 키에 맞는 값을 반환
       map_1.get("coffee"); // => 3000

       // 변수명.delete("키") => 해당 키와 값을 삭제
       map_1.delete("coffee")



    </script>
</head>

<body>



</body>

</html>
